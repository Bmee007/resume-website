<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="300" fill="#0a0f1a"/>

  <!-- Grid lines -->
  <g stroke="#10b981" stroke-width="0.4" opacity="0.15">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Circuit traces -->
  <g stroke="#10b981" stroke-width="2" fill="none" opacity="0.7">
    <!-- Top left cluster -->
    <polyline points="50,30 50,80 120,80 120,150 200,150"/>
    <polyline points="120,80 120,30 200,30 200,80 300,80"/>
    <polyline points="200,80 200,150 300,150 300,200 400,200"/>
    <polyline points="300,80 400,80 400,30 500,30"/>
    <polyline points="400,80 400,150 500,150 500,200 600,200"/>
    <!-- Middle cluster -->
    <polyline points="500,30 600,30 600,100 700,100 700,30 800,30"/>
    <polyline points="600,100 600,200 700,200 700,150 800,150 800,80 900,80"/>
    <polyline points="700,200 700,250 800,250 800,200 900,200 900,150 1000,150"/>
    <!-- Right cluster -->
    <polyline points="800,30 900,30 900,80 1000,80 1000,30 1100,30 1100,80"/>
    <polyline points="900,150 1000,150 1000,200 1100,200 1100,150 1150,150"/>
    <polyline points="1000,80 1000,150"/>
    <polyline points="1100,80 1100,150"/>
    <!-- Bottom traces -->
    <polyline points="50,200 50,270 150,270 150,250 250,250"/>
    <polyline points="250,250 350,250 350,270 500,270 500,250 600,250"/>
    <polyline points="600,250 600,270 750,270 750,250 850,250"/>
    <polyline points="850,250 950,250 950,270 1050,270 1050,250 1150,250 1150,270"/>
  </g>

  <!-- IC chips -->
  <g fill="#0d2818" stroke="#10b981" stroke-width="1.5" opacity="0.9">
    <rect x="155" y="60" width="90" height="50" rx="4"/>
    <rect x="455" y="110" width="90" height="50" rx="4"/>
    <rect x="655" y="60" width="90" height="60" rx="4"/>
    <rect x="955" y="110" width="90" height="60" rx="4"/>
    <rect x="255" y="160" width="90" height="50" rx="4"/>
    <rect x="755" y="160" width="90" height="50" rx="4"/>
  </g>

  <!-- IC pin lines -->
  <g stroke="#10b981" stroke-width="1.5" opacity="0.6">
    <!-- Chip 1 pins -->
    <line x1="155" y1="75" x2="140" y2="75"/><line x1="155" y1="90" x2="140" y2="90"/>
    <line x1="245" y1="75" x2="260" y2="75"/><line x1="245" y1="90" x2="260" y2="90"/>
    <!-- Chip 2 pins -->
    <line x1="455" y1="125" x2="440" y2="125"/><line x1="455" y1="140" x2="440" y2="140"/>
    <line x1="545" y1="125" x2="560" y2="125"/><line x1="545" y1="140" x2="560" y2="140"/>
    <!-- Chip 3 pins -->
    <line x1="655" y1="75" x2="640" y2="75"/><line x1="655" y1="95" x2="640" y2="95"/>
    <line x1="745" y1="75" x2="760" y2="75"/><line x1="745" y1="95" x2="760" y2="95"/>
    <!-- Chip 4 pins -->
    <line x1="955" y1="125" x2="940" y2="125"/><line x1="955" y1="145" x2="940" y2="145"/>
    <line x1="1045" y1="125" x2="1060" y2="125"/><line x1="1045" y1="145" x2="1060" y2="145"/>
  </g>

  <!-- Nodes / solder points -->
  <g fill="#10b981" opacity="0.9">
    <circle cx="50" cy="80" r="4"/>
    <circle cx="120" cy="80" r="4"/>
    <circle cx="200" cy="80" r="4"/>
    <circle cx="200" cy="150" r="4"/>
    <circle cx="300" cy="80" r="4"/>
    <circle cx="300" cy="150" r="4"/>
    <circle cx="300" cy="200" r="4"/>
    <circle cx="400" cy="80" r="4"/>
    <circle cx="400" cy="150" r="4"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="500" cy="150" r="4"/>
    <circle cx="500" cy="200" r="4"/>
    <circle cx="600" cy="100" r="4"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="600" cy="250" r="4"/>
    <circle cx="700" cy="100" r="4"/>
    <circle cx="700" cy="150" r="4"/>
    <circle cx="700" cy="200" r="4"/>
    <circle cx="700" cy="250" r="4"/>
    <circle cx="800" cy="150" r="4"/>
    <circle cx="800" cy="250" r="4"/>
    <circle cx="900" cy="80" r="4"/>
    <circle cx="900" cy="150" r="4"/>
    <circle cx="900" cy="200" r="4"/>
    <circle cx="1000" cy="80" r="4"/>
    <circle cx="1000" cy="150" r="4"/>
    <circle cx="1100" cy="80" r="4"/>
    <circle cx="1100" cy="150" r="4"/>
    <circle cx="1100" cy="200" r="4"/>
  </g>

  <!-- Glowing accent nodes -->
  <g fill="#10b981">
    <circle cx="600" cy="100" r="6" opacity="0.5"/>
    <circle cx="600" cy="100" r="3" opacity="1"/>
    <circle cx="700" cy="200" r="6" opacity="0.5"/>
    <circle cx="700" cy="200" r="3" opacity="1"/>
    <circle cx="1000" cy="150" r="6" opacity="0.5"/>
    <circle cx="1000" cy="150" r="3" opacity="1"/>
    <circle cx="300" cy="150" r="6" opacity="0.5"/>
    <circle cx="300" cy="150" r="3" opacity="1"/>
  </g>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="fade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0a0f1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#fade)"/>
</svg>
